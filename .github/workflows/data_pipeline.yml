name: Actualizar Datos
on:
  push:
    paths:
      - 'my-emae-dashboard/data/raw/**'
  workflow_dispatch:

# ESTO ES LO QUE LE DA PERMISO AL ROBOT PARA ESCRIBIR EL JSON
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas xlrd openpyxl

      - name: Ejecutar Procesamiento
        run: python my-emae-dashboard/scripts/processor.py

      - name: Guardar Cambios
        run: |
          git config --global user.name "DataBot"
          git config --global user.email "bot@github.com"
          git add my-emae-dashboard/data/processed/emae_data.json
          git commit -m "🤖 Datos EMAE actualizados automáticamente" || exit 0
          git push
          
          
